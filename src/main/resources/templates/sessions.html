<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedy - Sessions Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .status-badge {
            animation: pulse-subtle 2s ease-in-out infinite;
        }

        @keyframes pulse-subtle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .session-image {
            object-fit: cover;
            width: 100%;
            height: 100%;
        }

        .image-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            border-radius: 0.75rem;
            flex-shrink: 0;
        }

        .swal2-popup {
            border-radius: 16px !important;
            padding: 24px !important;
        }

        .shop-name {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .sessions-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .sessions-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1280px) {
            .sessions-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 min-h-screen">

    <!-- Main Container -->
    <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
        
        <!-- Header Section -->
        <div class="mb-8">
            <div class="glass-effect rounded-2xl p-6 sm:p-8 shadow-lg border border-white/20">
                <div class="flex items-center justify-between flex-wrap gap-4">
                    <div>
                        <h1 class="text-3xl sm:text-4xl font-bold text-gray-900 mb-2">
                            Active Sessions
                        </h1>
                        <p class="text-gray-600 text-sm sm:text-base">
                            Monitor Your Sessions
                        </p>
                        <div th:if="${shop != null}" class="mt-3">
                            <span class="shop-name inline-block px-4 py-2 rounded-full text-sm font-semibold text-white" th:text="${shop.name}">
                                Shop Name
                            </span>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button id="startSession" class="gradient-bg text-white px-6 py-3 rounded-xl font-semibold shadow-lg flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
                            </svg>
                            <span>New Session</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sessions Grid -->
        <div class="sessions-grid">
            <!-- Server-rendered sessions -->
            <div th:each="s : ${sessions}" 
                 class="glass-effect rounded-2xl p-5 shadow-lg border border-white/20 bike-item"
                 th:attr="data-uuid=${s.uuid}">
                
                <!-- Image Section -->
                <div class="image-container mb-4">
                    <img th:src="${s.getPictureURL()}"
                         alt="User Image" 
                         class="session-image shadow-md cursor-pointer"
                         th:attr="data-uuid=${s.uuid}">
                </div>

                <!-- Info Section -->
                <div class="mb-4">
                    <div class="flex items-start justify-between mb-3 gap-2">
                        <div class="flex-1">
                            <h3 class="text-2xl font-bold text-gray-900 mb-1" th:text="${s.getChargeNowFormatted()}">KSh 450</h3>
                            <p class="text-gray-700 font-medium mb-1" th:text="${s.userFullNames}">User Name</p>
                            <p class="text-sm text-gray-500 mt-2">
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-800" th:text="${s.getBikeCode()}">
                                    BK-1234
                                </span>
                            </p>
                        </div>
                        <div class="session-status">
                            <div class="status-badge bg-green-100 px-3 py-1 rounded-full">
                                <span class="flex items-center gap-1.5 text-xs font-semibold text-green-700">
                                    <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                                    <span>ONGOING</span>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons flex flex-col gap-2">
                    <button onclick="stopSession(this)" 
                            class="stop-btn w-full bg-red-500 hover:bg-red-600 text-white px-4 py-2.5 rounded-lg font-semibold shadow-md flex items-center justify-center gap-2"
                            title="Click to stop this session">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <rect x="6" y="6" width="12" height="12" rx="1"/>
                        </svg>
                        Stop Session
                    </button>
                </div>
            </div>
        </div>

        <!-- Empty State (shown when no sessions) -->
        <div th:if="${sessions.size() == 0}" class="glass-effect rounded-2xl p-12 shadow-lg border border-white/20 text-center min-h-[400px] flex flex-col items-center justify-center">
            <svg class="w-24 h-24 text-gray-300 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/>
            </svg>
            <h3 class="text-xl font-semibold text-gray-700 mb-2">No Active Sessions</h3>
            <p class="text-gray-500 mb-6 max-w-md">
                Start a new session to begin tracking bike rentals
            </p>
            <button id="startSessionEmpty" class="gradient-bg text-white px-8 py-3 rounded-xl font-semibold shadow-lg">
                Start First Session
            </button>
        </div>

    </div>

    <!-- Footer -->
    <footer class="text-center py-8 text-sm text-gray-400 mt-12">
        <p>&copy; 2025 Speedy Inc. All rights reserved.</p>
    </footer>

    <script>
        
    </script>

    <script src="/session-service.js"></script>
</body>
</html>
