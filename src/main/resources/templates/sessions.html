<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedy - Sessions</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1D4ED8',
                        secondary: '#2563EB',
                        accent: '#FBBF24',
                    },
                }
            }
        }
    </script>

    <style>
        .swal2-popup {
            border-radius: 20px !important;
        }

        .swal-mobile-fix {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }

        .swal2-container {
            padding: 10px !important;
        }

        .swal2-popup {
            margin: auto !important;
        }

        @media (max-width: 768px) {
            .swal2-popup {
                width: 90% !important;
                max-width: 400px !important;
            }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 min-h-screen flex justify-center items-start p-4">

    <!-- Mobile App Container -->
    <div class="bg-white w-full max-w-sm rounded-3xl shadow-xl overflow-hidden flex flex-col min-h-[80vh]">

        <!-- Header -->
        <header class="bg-blue-600 text-white p-6 text-center rounded-b-3xl">
            <h1 class="text-2xl font-bold mb-1"><span>Sessions</span></h1>
            <p class="text-sm opacity-90"span>Create and Manage Sessions</span></p>

            <p class="text-sm-600 mb-6" 
                th:if="${shop != null}">
                <span class="font-bold" th:text="${shop.name}">Shop Name</span>
            </p>
        </header>

        <main class="flex-1 p-6 space-y-6 overflow-auto">

            <section class="text-center">
                <button 
                    id="startSession"
                    class="bg-green-500 text-white font-bold px-6 py-3 rounded-md shadow hover:bg-green-600 hover:shadow-lg active:scale-95 transition-all duration-200 text-lg"
                >
                    New Session
                </button>

            </section>


            <div th:each="s : ${sessions}" th:if="${sessions.size() > 0}"
                class="flex items-center space-x-4 mb-6 bike-item">

                <!-- th:src="${s.pictureURL}"  -->

                <img th:src="${s.getPictureURL()}"
                    alt="User Image" 
                    class="w-24 h-24 object-cover rounded-xl shadow cursor-pointer"
                    th:attr="data-uuid=${s.uuid}">

                <div class="text-gray-700 flex-1">
                    <p class="text-xl font-semibold">rate</p>
                    <p><span class="font-semibold italic">[[${s.getBikeCode()}]]</span> - [[${s.userFullNames}]]</p>

                    <p>
                        <span th:text="${true} ? 'Available' : 'Unavailable'"
                            th:classappend="${true} ? 'text-green-600' : 'text-red-600'">
                        </span>
                    </p>
                </div>

                <button class="text-red-600 hover:text-red-800 p-1"
                        style="font-size: 0.75rem;"
                        onclick="confirmDelete(this)">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5-4h4m-4 0a2 2 0 00-2 2v0h8v0a2 2 0 00-2-2m-4 0V3m0 4v12" />
                    </svg>
                </button>
            </div>


            
        </main>
        <footer class="text-center p-4 text-sm text-gray-400">
            &copy; 2025 Speedy Inc.
        </footer>
    </div>
    <script src="/session-service.js"></script>
</body>
</html>
